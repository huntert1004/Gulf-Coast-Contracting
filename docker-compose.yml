services:
  php:
    image: php:8.3-apache
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/html
      - ./src:/var/www/src
    depends_on:
      - db
    command: >
      bash -c "a2enmod rewrite
      && docker-php-ext-install pdo pdo_mysql
      && apache2-foreground"

  db:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gulf_coast_contracting
      MYSQL_USER: gcc_user
      MYSQL_PASSWORD: gcc_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: gcc_user
      PMA_PASSWORD: gcc_password
    depends_on:
      - db

volumes:
  db_data: